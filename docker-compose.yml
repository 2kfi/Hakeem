version: '3.8'

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: llmsimt-hakeem:latest
    container_name: llmsimt-hakeem
    ports:
      - "8003:8003"
    volumes:
      - ./models:/app/models
      - ./MCP-servers:/app/MCP-servers
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8003
      - APP_LOG_LEVEL=INFO
      - STT_MODEL_PATH=/app/models/whisper-medium
      - STT_DEVICE=auto
      - STT_COMPUTE_TYPE=int8
      - STT_BEAM_SIZE=5
      - STT_VAD_FILTER=true
      - STT_VAD_THRESHOLD=0.5
      - STT_VAD_MIN_SPEECH_MS=250
      - STT_VAD_MIN_SILENCE_MS=200
      - TTS_EN_MODEL_PATH=/app/models/TTS-CORI-EN/en_GB-cori-high.onnx
      - TTS_EN_CONFIG_PATH=/app/models/TTS-CORI-EN/en_GB-cori-high.onnx.json
      - TTS_AR_MODEL_PATH=/app/models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx
      - TTS_AR_CONFIG_PATH=/app/models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx.json
      - TTS_VOLUME=0.5
      - TTS_LENGTH_SCALE=1.0
      - TTS_NOISE_SCALE=1.0
      - TTS_NOISE_W_SCALE=1.0
      - TTS_NORMALIZE_AUDIO=false
      - TTS_NCHANNELS=1
      - TTS_SAMPWIDTH=2
      - TTS_FRAMERATE=24000
      - LLM_API_URL=http://host.docker.internal:2312/v1
      - LLM_API_KEY=sk-no-key-required
      - LLM_MODEL=local-model
      - MCP_SERVER_URLS=http://host.docker.internal:2527/sse,http://host.docker.internal:2528/sse
      - MCP_MAX_RETRIES=2
      - MODELS_STORAGE_PATH=/app/models
      - MODELS_DOWNLOAD_ON_STARTUP=false
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]