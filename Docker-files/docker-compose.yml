version: '3.8'

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: llmsimt-pipeline:latest
    container_name: llmsimt-pipeline
    ports:
      - "8003:8003"
    volumes:
      - models:/app/models
    env_file:
      - .env
    environment:
      - APP_HOST=${APP_HOST:-0.0.0.0}
      - APP_PORT=${APP_PORT:-8003}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - STT_MODEL_PATH=/app/models/whisper-medium
      - STT_VARIANT=${STT_VARIANT:-medium}
      - STT_DEVICE=${STT_DEVICE:-auto}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_BEAM_SIZE=${STT_BEAM_SIZE:-5}
      - STT_VAD_FILTER=${STT_VAD_FILTER:-true}
      - TTS_EN_MODEL=/app/models/TTS-CORI-EN/en_GB-cori-high.onnx
      - TTS_EN_CONFIG=/app/models/TTS-CORI-EN/en_GB-cori-high.onnx.json
      - TTS_AR_MODEL=/app/models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx
      - TTS_AR_CONFIG=/app/models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx.json
      - TTS_VOLUME=${TTS_VOLUME:-0.5}
      - TTS_LENGTH_SCALE=${TTS_LENGTH_SCALE:-1.0}
      - TTS_NOISE_SCALE=${TTS_NOISE_SCALE:-1.0}
      - TTS_NOISE_W_SCALE=${TTS_NOISE_W_SCALE:-1.0}
      - TTS_NORMALIZE_AUDIO=${TTS_NORMALIZE_AUDIO:-false}
      - TTS_NCHANNELS=${TTS_NCHANNELS:-1}
      - TTS_SAMPWIDTH=${TTS_SAMPWIDTH:-2}
      - TTS_FRAMERATE=${TTS_FRAMERATE:-24000}
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:2312/v1}
      - LLM_API_KEY=${LLM_API_KEY:-sk-no-key-required}
      - MCP_SERVER_URLS=${MCP_SERVER_URLS:-http://host.docker.internal:2527/sse,http://host.docker.internal:2528/sse}
      - MCP_MAX_RETRIES=${MCP_MAX_RETRIES:-2}
      - MODELS_STORAGE_PATH=/app/models
      - MODELS_DOWNLOAD_ON_STARTUP=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./models
