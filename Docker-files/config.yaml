app:
  host: "0.0.0.0"
  port: 8003
  log_level: "INFO"

stt:
  model_path: "models/whisper-medium"
  variant: "medium"
  device: "auto"
  compute_type: "int8"
  beam_size: 5
  vad_filter: true

tts:
  en:
    model: "models/TTS-CORI-EN/en_GB-cori-high.onnx"
    config: "models/TTS-CORI-EN/en_GB-cori-high.onnx.json"
  ar:
    model: "models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx"
    config: "models/TTS-KAREEM-ARABIC/ar_JO-kareem-medium.onnx.json"
  settings:
    volume: 0.5
    length_scale: 1.0
    noise_scale: 1.0
    noise_w_scale: 1.0
    normalize_audio: false
    nchannels: 1
    sampwidth: 2
    framerate: 24000

llm:
  api_url: "http://10.200.71.180:2312/v1"
  api_key: "sk-no-key-required"

mcp:
  servers:
    - "http://10.200.71.180:2527/sse"
    - "http://10.200.71.180:2528/sse"
  max_retries: 2

models:
  storage_path: "./models"
  download_on_startup: true
  urls:
    whisper:
      base: "https://huggingface.co/Systran/faster-whisper-{variant}/resolve/main"
      files:
        - model.bin
        - config.json
        - vocabulary.txt
        - tokenizer.json
    tts_en:
      base: "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_GB/cori/high"
      files:
        - en_GB-cori-high.onnx
        - en_GB-cori-high.onnx.json
    tts_ar:
      base: "https://huggingface.co/rhasspy/piper-voices/resolve/main/ar/ar_JO/kareem/medium"
      files:
        - ar_JO-kareem-medium.onnx
        - ar_JO-kareem-medium.onnx.json
    medgemma:
      base: "https://huggingface.co/2kfi/medgemma-4B-it-fine-tuned-gguf/resolve/main"
      files:
        - MedGemma-3b-it-Q4_K_M.gguf
        - MedGemma-mmproj.gguf
