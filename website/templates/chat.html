<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakeem | Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/chat.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('hakeem-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="chat-page">

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/'" style="cursor:pointer">HAKEEM</div>
        <div class="nav-links">
            <button id="sidebar-toggle" class="btn-secondary" title="Toggle Sidebar">☰</button>
            <a href="/#features">Features</a>
            <button id="theme-toggle" class="btn-secondary" title="Toggle Theme">🌙</button>
            <button class="btn-outline" onclick="showPage('settings')">Settings</button>
        </div>
    </nav>

    <div class="chat-wrapper">
        <aside class="sidebar">
            <button class="new-chat-btn">+ New Chat</button>
            <div class="chat-history" id="chat-history">
                </div>
            <div class="sidebar-footer">
                <button class="btn-secondary" onclick="window.location.href='/'">← Home</button>
            </div>
        </aside>

        <main class="chat-main">
            <div id="messages-container" class="messages-container">
                <div class="welcome-message" id="welcome-screen">
                    <h1>How can Hakeem help you today?</h1>
                    <p>Start a conversation with your local AI assistant.</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea id="user-input" placeholder="Message Hakeem..." rows="1"></textarea>
                    <button id="send-btn" title="Send Message">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer" id="api-disclaimer">Hakeem may produce inaccurate information. Responses may vary.</p>
            </div>
        </main>
    </div>

    <dialog id="settings-modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="settings-group">
                <label for="api-provider">API Provider</label>
                <select id="api-provider">
                    <option value="llama-cpp">Llama.cpp (Default)</option>
                    <option value="openai">OpenAI API</option>
                    <option value="ollama">Ollama</option>
                    <option value="gemini">Google Gemini</option>
                </select>
            </div>
            <div class="settings-group">
                <label for="api-url">API Endpoint</label>
                <input type="text" id="api-url" value="http://localhost:8080/v1">
            </div>
            <div class="settings-group">
                <label for="api-key">API Key (if required)</label>
                <input type="password" id="api-key" placeholder="Enter your API key">
            </div>
            <div class="settings-group" style="display: none;">
                <label for="model-input">Model Name</label>
                <input type="text" id="model-input" placeholder="e.g., gpt-4, llama2">
            </div>
            <div class="settings-group">
                <label for="system-prompt">System Prompt</label>
                <textarea id="system-prompt">You are Hakeem, a wise and helpful AI assistant.</textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="saveSettings()">Save Configuration</button>
                <button class="btn-secondary" onclick="document.getElementById('settings-modal').close()">Close</button>
            </div>
        </div>
    </dialog>

    <script src="/static/app.js"></script>
    <script src="/static/chat.js"></script>
</body>
</html>
