<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HAKEEM AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('hakeem-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/'" style="cursor: pointer;">HAKEEM</div>
        <div class="nav-links">
            <button id="theme-toggle" class="btn-secondary" title="Toggle Theme">🌙</button>
        </div>
    </nav>

    <main class="auth-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Login to continue your conversation.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-primary btn-lg login-btn">Login to Hakeem</button>
            </form>

            <div class="auth-footer">
                New here? <a href="#">Request Access</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2024 Hakeem AI. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/app.js"></script>
    <script src="/static/login.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            handleLogin();
        });
    </script>
</body>
</html>
